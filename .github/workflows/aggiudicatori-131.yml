name: Aggiudicatori ANNCSU 1.3.1

on:
  schedule:
    - cron: '0 5 * * *'   # ogni giorno alle 05:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-aggiudicatori:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas requests

      - name: Crea cartelle
        run: mkdir -p dati dati/backup

      - name: Esegui pipeline aggiudicatori
        run: python scripts/fetch_aggiudicatori.py

      - name: Commit e push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dati/aggiudicatori.csv dati/backup/
          git diff --staged --quiet || git commit -m "chore: aggiorna aggiudicatori ANNCSU 1.3.1 [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
