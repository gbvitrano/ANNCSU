name: Aggiorna Statistiche ANNCSU

on:
  schedule:
    # - cron: '0 22 * * *' # tutti i giorni alle 22  UTC
      - cron: '0 1 1,3,5,7,9,11,13,15 * 1-5'  # alle 23 UTC dei nei giorni dispari dei primi 15 giorni del mese, sabato e domenica esclusi
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt-in Node.js 24 subito

jobs:
  extract-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas pyarrow requests geopandas

      - name: Crea cartella dati se non esiste
        run: mkdir -p dati

      - name: Esegui script di estrazione
        run: python scripts/extract_parquet_stats.py

      - name: Commit e push dei risultati
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dati/anncsu_stats.csv dati/anncsu_stats.json dati/backup/
          git diff --staged --quiet || git commit -m "chore: aggiorna statistiche ANNCSU [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push